<script>
/**
 * MOTOR PSICOMÉTRICO
 * ------------------
 *  - IRT modelo logístico de 3 parámetros (3PL): P(θ) = c + (1-c)/(1+e^{-Da(θ-b)})
 *  - Estimación de la habilidad θ por EAP (Expected A Posteriori) con prior N(0,1)
 *  - Test Adaptativo Computarizado (CAT): selecciona dificultad ≈ θ y equilibra dominios
 *  - Normas por edad (media poblacional esperada de θ por dominio y edad)
 *  - Conversión a escala CI: μ = 100, σ = 15  (CI = 100 + 15·θ_normada)
 *
 *  Nota de rigor: la maquinaria estadística es estándar. Las normas por edad son
 *  ilustrativas (basadas en las curvas conocidas de desarrollo y envejecimiento
 *  cognitivo); una baremación clínica real exige una muestra de estandarización.
 */
(function (global) {
  'use strict';

  var D = 1.702; // constante de escala logística (aprox. ojiva normal)
  var GRID = (function () { var g = []; for (var t = -4; t <= 4.00001; t += 0.1) g.push(Math.round(t * 10) / 10); return g; })();
  var DOMAINS = ['Gf', 'Gc', 'Gwm', 'Gs', 'Gv'];
  var DOMAIN_NAMES = {
    Gf: 'Razonamiento fluido (Gf)',
    Gc: 'Conocimiento cristalizado (Gc)',
    Gwm: 'Memoria de trabajo (Gwm)',
    Gs: 'Velocidad de procesamiento (Gs)',
    Gv: 'Procesamiento visoespacial (Gv)'
  };

  // ----------------------------------------------------------------- IRT 3PL
  function prob(theta, item) {
    var z = D * item.a * (theta - item.b);
    return item.c + (1 - item.c) / (1 + Math.exp(-z));
  }
  function info(theta, item) {
    var p = prob(theta, item);
    p = Math.min(0.99999, Math.max(0.00001, p));
    var q = 1 - p;
    var num = Math.pow(D * item.a * (p - item.c) / (1 - item.c), 2);
    return num * (q / p);
  }
  function normPrior(t) { return Math.exp(-t * t / 2); }

  // EAP sobre una lista de respuestas [{item, correct}]
  function eap(responses) {
    var num = 0, den = 0, post = [];
    for (var i = 0; i < GRID.length; i++) {
      var t = GRID[i], lik = 1;
      for (var r = 0; r < responses.length; r++) {
        var p = prob(t, responses[r].item);
        lik *= responses[r].correct ? p : (1 - p);
      }
      var w = lik * normPrior(t);
      post.push(w); den += w; num += t * w;
    }
    if (den === 0) return { theta: 0, se: 1 };
    var mean = num / den, varSum = 0;
    for (var k = 0; k < GRID.length; k++) varSum += Math.pow(GRID[k] - mean, 2) * post[k];
    return { theta: mean, se: Math.sqrt(varSum / den) };
  }

  // --------------------------------------------------------- Normas por edad
  // Media poblacional esperada de θ (referencia: adulto joven en plenitud ≈ 0).
  var AGE_ANCHORS = [6, 10, 14, 18, 22, 30, 40, 50, 60, 70, 80, 90];
  var AGE_MEAN = {
    Gf:  [-2.2, -1.5, -0.7, -0.10, 0.05,  0.00, -0.10, -0.25, -0.45, -0.70, -1.00, -1.30],
    Gs:  [-2.0, -1.3, -0.5,  0.05, 0.10,  0.00, -0.15, -0.35, -0.60, -0.90, -1.20, -1.50],
    Gwm: [-1.9, -1.3, -0.6, -0.05, 0.05,  0.05, -0.05, -0.20, -0.40, -0.65, -0.95, -1.25],
    Gv:  [-1.9, -1.2, -0.5,  0.00, 0.05,  0.00, -0.10, -0.25, -0.45, -0.65, -0.90, -1.15],
    Gc:  [-2.4, -1.7, -0.9, -0.35, -0.10, 0.05,  0.20,  0.30,  0.33,  0.30,  0.20,  0.05]
  };
  function interp(xs, ys, x) {
    if (x <= xs[0]) return ys[0];
    if (x >= xs[xs.length - 1]) return ys[ys.length - 1];
    for (var i = 1; i < xs.length; i++) {
      if (x <= xs[i]) {
        var f = (x - xs[i - 1]) / (xs[i] - xs[i - 1]);
        return ys[i - 1] + f * (ys[i] - ys[i - 1]);
      }
    }
    return ys[ys.length - 1];
  }
  function ageExpectedMean(age, domain) {
    return interp(AGE_ANCHORS, AGE_MEAN[domain], age);
  }
  function ageExpectedOverall(age) {
    var s = 0; DOMAINS.forEach(function (d) { s += ageExpectedMean(age, d); }); return s / DOMAINS.length;
  }

  // ----------------------------------------------------- Estadística normal
  function erf(x) {
    var t = 1 / (1 + 0.3275911 * Math.abs(x));
    var y = 1 - (((((1.061405429 * t - 1.453152027) * t) + 1.421413741) * t - 0.284496736) * t + 0.254829592) * t * Math.exp(-x * x);
    return x >= 0 ? y : -y;
  }
  function normalCdf(z) { return 0.5 * (1 + erf(z / Math.SQRT2)); }
  function percentileFromIQ(iq) {
    var p = normalCdf((iq - 100) / 15) * 100;
    return Math.max(0.1, Math.min(99.9, p));
  }
  function classify(iq) {
    if (iq >= 130) return 'Muy superior';
    if (iq >= 120) return 'Superior';
    if (iq >= 110) return 'Promedio alto';
    if (iq >= 90) return 'Promedio';
    if (iq >= 80) return 'Promedio bajo';
    if (iq >= 70) return 'Limítrofe';
    return 'Extremadamente bajo';
  }
  function domainInterpretation(index) {
    if (index >= 120) return 'Fortaleza marcada: rendimiento muy por encima del promedio.';
    if (index >= 110) return 'Por encima del promedio.';
    if (index >= 90) return 'Dentro del promedio esperado.';
    if (index >= 80) return 'Ligeramente por debajo del promedio.';
    return 'Área a reforzar: por debajo del promedio.';
  }

  // ======================================================================
  //  Sesión CAT
  // ======================================================================
  var LENGTHS = {
    short:    { minItems: 16, maxItems: 22, perDomainMin: 3 },
    standard: { minItems: 25, maxItems: 32, perDomainMin: 5 },
    full:     { minItems: 35, maxItems: 42, perDomainMin: 7 }
  };
  var TARGET_SE = 0.30;

  function createSession(opts) {
    var cfg = LENGTHS[opts.length] || LENGTHS.standard;
    var adaptive = opts.adaptive !== false;
    var state = {
      adaptive: adaptive,
      cfg: cfg,
      responses: [],
      usedIds: [],
      counts: { Gf: 0, Gc: 0, Gwm: 0, Gs: 0, Gv: 0 },
      theta: 0, se: 1,
      current: null
    };

    function nextDomain() {
      var best = null, bestC = Infinity;
      DOMAINS.forEach(function (d) {
        if (state.counts[d] < bestC) { bestC = state.counts[d]; best = d; }
      });
      return best;
    }

    function nextItem() {
      var domain = nextDomain();
      var targetB = adaptive ? Math.max(-2.5, Math.min(2.5, state.theta)) : 0;
      var item = global.ITEMBANK.generate(domain, targetB, state.usedIds, state.counts[domain]);
      state.current = item;
      return item;
    }

    function submit(outcome) {
      var item = state.current;
      state.responses.push({ item: item, correct: !!outcome.correct, timeMs: outcome.timeMs || 0, chosen: outcome.chosen });
      state.usedIds.push(item.id);
      state.counts[item.domain]++;
      var est = eap(state.responses);
      state.theta = est.theta; state.se = est.se;
      state.responses[state.responses.length - 1].thetaAfter = est.theta;
      state.responses[state.responses.length - 1].seAfter = est.se;
      return est;
    }

    function administered() { return state.responses.length; }

    function done() {
      var n = administered();
      if (n >= cfg.maxItems) return true;
      if (!adaptive) return n >= cfg.minItems;
      var allDomains = DOMAINS.every(function (d) { return state.counts[d] >= cfg.perDomainMin; });
      return n >= cfg.minItems && allDomains && state.se <= TARGET_SE;
    }

    function progress() {
      return { n: administered(), max: cfg.maxItems, min: cfg.minItems, theta: state.theta, se: state.se };
    }

    return {
      nextItem: nextItem,
      submit: submit,
      done: done,
      progress: progress,
      state: state,
      finalize: function (profile) { return finalize(state, profile); }
    };
  }

  // ======================================================================
  //  Cálculo final del perfil
  // ======================================================================
  function finalize(state, profile) {
    var age = Number(profile.age) || 25;
    var byDomain = {};
    DOMAINS.forEach(function (d) { byDomain[d] = []; });
    state.responses.forEach(function (r) { byDomain[r.item.domain].push(r); });

    var domains = {};
    DOMAINS.forEach(function (d) {
      var est = byDomain[d].length ? eap(byDomain[d]) : { theta: 0, se: 1 };
      var normed = est.theta - ageExpectedMean(age, d);
      var index = Math.round(100 + 15 * normed);
      index = Math.max(40, Math.min(160, index));
      domains[d] = {
        name: DOMAIN_NAMES[d],
        rawTheta: round2(est.theta),
        theta: round2(normed),
        se: round2(est.se),
        index: index,
        percentile: round1(percentileFromIQ(index)),
        nItems: byDomain[d].length,
        nCorrect: byDomain[d].filter(function (r) { return r.correct; }).length,
        interpretation: domainInterpretation(index)
      };
    });

    // Global: EAP sobre todos los ítems, normado por la media de edad promedio.
    var overall = eap(state.responses);
    var normedOverall = overall.theta - ageExpectedOverall(age);
    var iq = Math.round(100 + 15 * normedOverall);
    iq = Math.max(40, Math.min(160, iq));
    var seIQ = 15 * overall.se;
    var ciLow = Math.round(iq - 1.96 * seIQ);
    var ciHigh = Math.round(iq + 1.96 * seIQ);
    var percentile = round1(percentileFromIQ(iq));

    // Fortalezas / debilidades (intra-individuales + absolutas)
    var indices = DOMAINS.map(function (d) { return domains[d].index; });
    var meanIdx = indices.reduce(function (a, b) { return a + b; }, 0) / indices.length;
    var strengths = [], weaknesses = [];
    DOMAINS.forEach(function (d) {
      var idx = domains[d].index;
      if (idx >= meanIdx + 8 || idx >= 115) strengths.push(d);
      if (idx <= meanIdx - 8 || idx <= 85) weaknesses.push(d);
    });
    strengths.sort(function (a, b) { return domains[b].index - domains[a].index; });
    weaknesses.sort(function (a, b) { return domains[a].index - domains[b].index; });

    var totalTimeSec = Math.round(state.responses.reduce(function (s, r) { return s + (r.timeMs || 0); }, 0) / 1000);

    var detailItems = state.responses.map(function (r) {
      return {
        domain: r.item.domain, type: r.item.type, b: round2(r.item.b), a: r.item.a,
        correct: r.correct, timeMs: r.timeMs,
        thetaAfter: round2(r.thetaAfter), seAfter: round2(r.seAfter)
      };
    });

    return {
      sessionId: 'sess_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      name: profile.name, age: age, gender: profile.gender,
      iq: iq, theta: round2(normedOverall), se: round2(overall.se),
      ciLow: ciLow, ciHigh: ciHigh, percentile: percentile,
      classification: classify(iq),
      domains: domains,
      strengths: strengths, weaknesses: weaknesses,
      itemsAdministered: state.responses.length,
      totalTimeSec: totalTimeSec,
      narrative: buildNarrative(profile, iq, percentile, domains, strengths, weaknesses, age),
      detail: { items: detailItems },
      adaptive: state.adaptive
    };
  }

  function buildNarrative(profile, iq, pct, domains, strengths, weaknesses, age) {
    var name = profile.name || 'La persona evaluada';
    var lines = [];
    lines.push(name + ' obtuvo un CI global estimado de ' + iq + ' (' + classify(iq) +
      '), situándose en el percentil ' + pct + ' respecto a su grupo de edad (' + age + ' años). ' +
      'Esto significa que su rendimiento iguala o supera al de aproximadamente el ' + Math.round(pct) + '% de las personas de edad comparable.');
    if (strengths.length) {
      lines.push('Puntos fuertes: ' + strengths.map(function (d) { return DOMAIN_NAMES[d] + ' (índice ' + domains[d].index + ')'; }).join('; ') + '. ' +
        'Estas áreas destacan por encima del resto de su perfil cognitivo.');
    } else {
      lines.push('El perfil es homogéneo: no hay un dominio que sobresalga claramente sobre los demás.');
    }
    if (weaknesses.length) {
      lines.push('Áreas a reforzar: ' + weaknesses.map(function (d) { return DOMAIN_NAMES[d] + ' (índice ' + domains[d].index + ')'; }).join('; ') + '. ' +
        'Son las dimensiones con menor rendimiento relativo y donde el entrenamiento tendría más margen de mejora.');
    } else {
      lines.push('No se identifican debilidades relativas significativas; todas las dimensiones se sitúan en niveles comparables.');
    }
    return lines;
  }

  function round2(x) { return Math.round(x * 100) / 100; }
  function round1(x) { return Math.round(x * 10) / 10; }

  global.ENGINE = {
    createSession: createSession,
    finalize: finalize,
    prob: prob, info: info, eap: eap,
    ageExpectedMean: ageExpectedMean, ageExpectedOverall: ageExpectedOverall,
    classify: classify, percentileFromIQ: percentileFromIQ, normalCdf: normalCdf,
    DOMAINS: DOMAINS, DOMAIN_NAMES: DOMAIN_NAMES, LENGTHS: LENGTHS
  };
})(typeof window !== 'undefined' ? window : globalThis);
</script>
